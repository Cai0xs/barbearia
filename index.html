<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Elite - Agendamento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>BARBEARIA ELITE</h1>
            <p>Modernidade e tradição no seu visual</p>
            <div style="margin-top: 15px;">
                <button id="btn-navegar-agendar" class="btn-submit" style="width: auto; display: inline-block; margin-right: 10px; padding: 10px 20px;">Agendar Horário</button>
                <button id="btn-navegar-consultar" class="btn-submit btn-secondary" style="width: auto; display: inline-block; padding: 10px 20px;">Meus Agendamentos</button>
            </div>
        </header>

        <main class="card">
            <div id="section-form">
                <h2>Agende seu Horário</h2>
                <p class="subtitle">Preencha todos os campos obrigatórios abaixo</p>

                <form id="form-agendamento" novalidate>
                    <div id="feedback-message" class="feedback hidden"></div>

                    <div class="form-group">
                        <label for="nome_cliente">Nome Completo *</label>
                        <input type="text" id="nome_cliente" name="nome_cliente" required placeholder="Ex: João Silva">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="telefone_cliente">Telefone de Contato *</label>
                            <input type="tel" id="telefone_cliente" name="telefone_cliente" required placeholder="(81) 99999-0000" maxlength="15">
                        </div>

                        <div class="form-group">
                            <label for="email_cliente">E-mail *</label>
                            <input type="email" id="email_cliente" name="email_cliente" required placeholder="exemplo@email.com">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="data_agendamento">Data do Serviço *</label>
                            <input type="date" id="data_agendamento" name="data_agendamento" required>
                        </div>

                        <div class="form-group">
                            <label for="hora_agendamento">Horário do Serviço *</label>
                            <select id="hora_agendamento" name="hora_agendamento" required>
                                <option value="" disabled selected>Selecione uma data primeiro...</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="servico_desejado">Serviço Desejado *</label>
                        <select id="servico_desejado" name="servico_desejado" required>
                            <option value="" disabled selected>Selecione um serviço...</option>
                            <option value="Corte de Cabelo">Corte de Cabelo</option>
                            <option value="Barba">Barba</option>
                            <option value="Cabelo + Barba">Cabelo + Barba</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-submit">Confirmar Agendamento</button>
                </form>
            </div>

            <div id="section-success" class="success-screen hidden">
                <div class="success-icon-wrapper">
                    <div class="success-icon"><span class="checkmark"></span></div>
                </div>
                <h2>Sucesso!</h2>
                <p id="success-text">Seu agendamento foi confirmado e enviado ao sistema.</p>
                <button id="btn-novo-agendamento" class="btn-submit btn-secondary">Novo Agendamento</button>
            </div>

            <div id="section-consultar" class="hidden">
                <h2>Meus Agendamentos</h2>
                <p class="subtitle">Digite seu e-mail para buscar seus horários marcados</p>
                
                <div class="form-group">
                    <input type="email" id="email-busca" placeholder="Digite seu e-mail cadastrado">
                    <button id="btn-buscar" class="btn-submit" style="margin-top: 10px;">Buscar Agendamentos</button>
                </div>

                <div id="resultado-busca" style="margin-top: 20px;">
                    </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
